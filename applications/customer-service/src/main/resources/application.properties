spring.application.name=customer-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/baraza_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:baraza}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:baraza123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080